version: "3.9"

services:
  api:
    build: .
    container_name: tydline-api
    ports:
      - "8000:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - ENVIRONMENT=development
    volumes:
      # Hot-reload source in development
      - ./app:/app/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  tracker:
    build: .
    container_name: tydline-tracker
    env_file:
      - .env
    command:
      [
        "sh",
        "-c",
        "while true; do python -m app.workers.tracker; sleep 900; done",
      ]
    restart: unless-stopped
    depends_on:
      - api
